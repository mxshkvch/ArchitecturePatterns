version: '3.8'

services:
  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    container_name: bank_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bank_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  coreservice:
    build:
      context: .
      dockerfile: src/CoreService/Dockerfile
    container_name: bank_coreservice
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=MyDb;Username=postgres;Password=postgres
      - Jwt__Issuer=black.auth
      - Jwt__Audience=black.api
      - RabbitMq__HostName=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__UserName=guest
      - RabbitMq__Password=guest
      - RabbitMq__QueueName=core.account.operations
      - FirebasePush__Enabled=true
      - FirebasePush__ProjectId=architecturepatterns-d92c3
      - FirebasePush__CredentialsFilePath=/app/secrets/firebase-service-account.json
      - FirebasePush__CredentialsJson=
      - FirebasePush__ClientTopicPrefix=user-
      - FirebasePush__StaffTopic=employees
      - Services__MonitoringServiceUrl=http://monitoringservice:8080/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      monitoringservice:
        condition: service_started

  userservice:
    build:
      context: .
      dockerfile: src/UserService/Dockerfile
    container_name: bank_userservice
    ports:
      - "60882:8080"
    environment:

      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=UserService;Username=postgres;Password=postgres
      - Jwt__Issuer=black.auth
      - Jwt__Audience=black.api
      - Services__MonitoringServiceUrl=http://monitoringservice:8080/
    depends_on:
      postgres:
        condition: service_healthy
      monitoringservice:
        condition: service_started

  authservice:
    build:
      context: .
      dockerfile: src/AuthService/Dockerfile
    container_name: bank_authservice
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=AuthDb;Username=postgres;Password=postgres
      - Services__UserServiceUrl=http://userservice:8080/
      - Jwt__Issuer=black.auth
      - Jwt__Audience=black.api
      - OAuth__Clients__0__ClientId=credit-service
      - OAuth__Clients__0__ClientSecret=credit-service-secret
      - OAuth__Clients__0__Role=SERVICE
      - OAuth__Clients__0__RedirectUris__0=
      - OAuth__Clients__1__ClientId=client-bank
      - OAuth__Clients__1__ClientSecret=
      - OAuth__Clients__1__Role=CLIENT
      - OAuth__Clients__1__RedirectUris__0=http://localhost:3000/callback
      - OAuth__Clients__2__ClientId=staff-service
      - OAuth__Clients__2__ClientSecret=
      - OAuth__Clients__2__Role=EMPLOYEE
      - OAuth__Clients__2__RedirectUris__0=http://localhost:3001/callback
    depends_on:
      postgres:
        condition: service_healthy
      userservice:
        condition: service_started

  creditservice:
    build:
      context: .
      dockerfile: src/CreditService/Dockerfile
    container_name: bank_creditservice
    ports:
      - "5107:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=CreditService;Username=postgres;Password=postgres
      - Services__UserServiceUrl=http://userservice:8080/
      - Services__CoreServiceUrl=http://coreservice:8080/
      - Services__AuthServiceUrl=http://authservice:8080/
      - Services__MonitoringServiceUrl=http://monitoringservice:8080/
      - OAuth__ClientId=credit-service
      - OAuth__ClientSecret=credit-service-secret
      - Jwt__Issuer=black.auth
      - Jwt__Audience=black.api
    depends_on:
      postgres:
        condition: service_healthy
      authservice:
        condition: service_started
      monitoringservice:
        condition: service_started

  bffservice:
    build:
      context: .
      dockerfile: src/BffService/Dockerfile
    container_name: bank_bffservice
    ports:
      - "5208:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=BffService;Username=postgres;Password=postgres
      - Jwt__Issuer=black.auth
      - Jwt__Audience=black.api
      - FirebasePush__Enabled=true
      - FirebasePush__ProjectId=architecturepatterns-d92c3
      - FirebasePush__CredentialsFilePath=/app/secrets/firebase-service-account.json
      - FirebasePush__CredentialsJson=
      - FirebasePush__ClientTopicPrefix=user-
      - FirebasePush__StaffTopic=employees
    depends_on:
      postgres:
        condition: service_healthy

  monitoringservice:
    build:
      context: .
      dockerfile: src/MonitoringService/Dockerfile
    container_name: bank_monitoringservice
    ports:
      - "5300:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=MonitoringService;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
