<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг микросервисов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

       

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-title {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .stat-unit {
            font-size: 14px;
            color: #999;
            margin-left: 5px;
        }

        .error-card .stat-value {
            color: #e74c3c;
        }

        .success-card .stat-value {
            color: #27ae60;
        }

        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        .refresh-btn {
            background: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .timestamp {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.8;
        }

        canvas {
            max-height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        
       

        <div class="stats-grid" id="statsGrid">
            <!-- Карточки со статистикой заполняются через JS -->
        </div>

        <div class="charts-row">
            <div class="chart-container">
                <div class="chart-title">📈 Запросы vs Ошибки</div>
                <canvas id="requestsChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">⏱️ Длительность ответов (мс)</div>
                <canvas id="durationChart"></canvas>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">🎯 Процент ошибок</div>
            <canvas id="errorChart"></canvas>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        let requestsChart, durationChart, errorChart;

        function initCharts() {
            const ctx1 = document.getElementById('requestsChart').getContext('2d');
            const ctx2 = document.getElementById('durationChart').getContext('2d');
            const ctx3 = document.getElementById('errorChart').getContext('2d');

            requestsChart = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: ['Total Requests', 'Errors'],
                    datasets: [{
                        label: 'Количество',
                        data: [0, 0],
                        backgroundColor: ['#3498db', '#e74c3c'],
                        borderColor: ['#2980b9', '#c0392b'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top' }
                    }
                }
            });

            durationChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: ['Min', 'Avg', 'Max'],
                    datasets: [{
                        label: 'Длительность (мс)',
                        data: [0, 0, 0],
                        borderColor: '#f39c12',
                        backgroundColor: 'rgba(243, 156, 18, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 6,
                        pointBackgroundColor: '#f39c12'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y.toFixed(2) + ' мс';
                                }
                            }
                        }
                    }
                }
            });

            errorChart = new Chart(ctx3, {
                type: 'doughnut',
                data: {
                    labels: ['Успешные запросы', 'Ошибки'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#27ae60', '#e74c3c'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.parsed;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return `${label}: ${value} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        async function fetchMetrics() {
            try {
                const response = await fetch('http://89.23.105.66:5300/api/monitoring/metrics');
                const data = await response.json();

                updateStatsCards(data);
                
                updateCharts(data);

                document.getElementById('timestamp').innerHTML = `Последнее обновление: ${new Date().toLocaleString()}`;
                
            } catch (error) {
                console.error('Ошибка получения метрик:', error);
                document.getElementById('timestamp').innerHTML = '❌ Ошибка подключения к серверу мониторинга';
            }
        }

        function updateStatsCards(data) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-title">📊 Всего запросов</div>
                    <div class="stat-value">${data.totalRequests}</div>
                </div>
                <div class="stat-card error-card">
                    <div class="stat-title">❌ Количество ошибок</div>
                    <div class="stat-value">${data.errorCount}</div>
                </div>
                <div class="stat-card error-card">
                    <div class="stat-title">⚠️ Процент ошибок</div>
                    <div class="stat-value">${data.errorPercentage.toFixed(1)}<span class="stat-unit">%</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">⚡ Среднее время ответа</div>
                    <div class="stat-value">${data.avgDurationMs.toFixed(2)}<span class="stat-unit">мс</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">🚀 Максимальное время</div>
                    <div class="stat-value">${data.maxDurationMs.toFixed(2)}<span class="stat-unit">мс</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">⚡ Минимальное время</div>
                    <div class="stat-value">${data.minDurationMs.toFixed(2)}<span class="stat-unit">мс</span></div>
                </div>
            `;
        }

        function updateCharts(data) {
            requestsChart.data.datasets[0].data = [data.totalRequests, data.errorCount];
            requestsChart.update();

            durationChart.data.datasets[0].data = [
                data.minDurationMs,
                data.avgDurationMs,
                data.maxDurationMs
            ];
            durationChart.update();

            const successCount = data.totalRequests - data.errorCount;
            errorChart.data.datasets[0].data = [successCount, data.errorCount];
            errorChart.update();
        }

        let autoRefreshInterval;

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(fetchMetrics, 10000);
        }

        initCharts();
        fetchMetrics();
        startAutoRefresh();
    </script>
</body>
</html>
